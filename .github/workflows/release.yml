name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump to (e.g. 2.6.0). Only used by manual trigger.'
        required: true
        default: '2.6.0'

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  build-and-test:
    permissions:
      id-token: write
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          6.0.x
          8.0.x
          9.0.x
          10.0.x

    - name: Build Reason
      run: "echo ref: ${{github.ref}} event: ${{github.event_name}} os: ${{ matrix.os }}"

    - name: Extract Version from Tag
      shell: pwsh
      run: |
        # Extract version from tag: v2.4.0 -> 2.4.0, v2.4.0-preview1 -> 2.4.0-preview1
        $tag = "${{ github.ref_name }}"
        $version = $tag.TrimStart('v')
        echo "Full Version: $version"
        Add-Content -Path $Env:GITHUB_ENV -Value "FULL_VERSION=$version"

    - name: Build
      shell: bash
      run: |
        for project in $(find ./src -name "*.csproj"); do
          dotnet build --configuration Release $project -p:Version=${{ env.FULL_VERSION }}
        done

    - name: Run Tests
      shell: bash
      run: |
        for project in $(find ./tests -name "*.csproj"); do
          dotnet test --configuration Release $project
        done

    - name: Package
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        for project in $(find ./src -name "*.csproj"); do
          dotnet pack --configuration Release --no-build $project -p:PackageVersion=${{ env.FULL_VERSION }} --include-source --output ./artifacts/packages
        done

    - name: Publish Release Packages to MyGet
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        for package in $(find ./artifacts/packages/ -name "*.nupkg" -o -name "*.snupkg"); do
          echo "Pushing $package to MyGet (release)..."
          dotnet nuget push "$package" \
            --source "https://www.myget.org/F/aspectcore/api/v2/package" \
            --api-key ${{ secrets.MYGET_API_KEY }} \
            --skip-duplicate || echo "Skipping: Package push failed or already exists."
        done

    - name: NuGet login (OIDC → temp API key)
      if: matrix.os == 'windows-latest'
      uses: NuGet/login@v1
      id: nuget_login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Publish Release Packages to NuGet.org
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        for package in $(find ./artifacts/packages/ -name "*.nupkg" -o -name "*.snupkg"); do
          echo "Pushing $package to NuGet.org (release)..."
          dotnet nuget push "$package" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} \
            --skip-duplicate || echo "Skipping: Package push failed or already exists."
        done

    - name: Create GitHub Release
      if: matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/packages/*.nupkg
          artifacts/packages/*.snupkg
        generate_release_notes: true

  update-version:
    # For tag pushes: only bump version for stable releases (not pre-releases like beta/rc/alpha)
    # For manual trigger: always run
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract Version
      shell: pwsh
      run: |
        if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
          # Manual trigger: use the input version
          $version = "${{ github.event.inputs.version }}"
        } else {
          # Tag trigger: extract from tag and bump to next minor
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $parts = $version -split '\.'
          $major = $parts[0]
          $minor = $parts[1]
          $patch = ($parts[2] -split '-')[0]
          # Bump to next minor: 2.5.0 -> 2.6.0
          $version = "$major.$([int]$minor + 1).0"
        }

        $parts = $version -split '\.'
        echo "MAJOR=$($parts[0])" >> $env:GITHUB_ENV
        echo "MINOR=$($parts[1])" >> $env:GITHUB_ENV
        echo "PATCH=$($parts[2])" >> $env:GITHUB_ENV
        echo "Version to bump: $version"

    - name: Update version.props
      shell: pwsh
      run: |
        $path = "./build/version.props"
        [xml]$xml = Get-Content $path
        $xml.Project.PropertyGroup.VersionMajor = $env:MAJOR
        $xml.Project.PropertyGroup.VersionMinor = $env:MINOR
        $xml.Project.PropertyGroup.VersionPatch = $env:PATCH
        $xml.Project.PropertyGroup.VersionQuality = ""
        $xml.Save($path)
        echo "Updated version.props to $($env:MAJOR).$($env:MINOR).$($env:PATCH)"

    - name: Create PR for version bump
      uses: peter-evans/create-pull-request@v6
      with:
        base: master
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore: bump version to ${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}"
        title: "chore: bump version to ${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}"
        author: "github-actions[bot] <41898275+github-actions[bot]@users.noreply.github.com>"
        committer: "github-actions[bot] <41898275+github-actions[bot]@users.noreply.github.com>"
        body: |
          Auto-generated version bump.

          Updated `build/version.props` to ${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }} so that
          subsequent preview packages use the correct base version.

          Note: For patch releases (e.g. 2.6.1), update `build/version.props` manually.
        branch: chore/version-bump-${{ env.MAJOR }}.${{ env.MINOR }}.${{ env.PATCH }}
        delete-branch: true
