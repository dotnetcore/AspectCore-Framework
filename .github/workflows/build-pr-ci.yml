name: Build for PR
on:
  pull_request:

jobs:
  build-and-test-pr:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with: # Install all required versions explicitly, since some frameworks may be missing from the image if they have been removed due to end of support.
        dotnet-version: |
          6.0.x
          8.0.x
          9.0.x
          10.0.x

    - name: Build Reason
      run: "echo ref: ${{github.ref}} event: ${{github.event_name}} os: ${{ matrix.os }}"

    - name: Lint (dotnet format)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        dotnet format AspectCore-Framework.sln --verify-no-changes --verbosity diagnostic

    - name: Build
      shell: bash
      run: |
        for project in $(find ./src -name "*.csproj"); do
          dotnet build --configuration Release $project
        done

    - name: Run Tests
      shell: bash
      run: |
        for project in $(find ./tests -name "*.csproj"); do
          dotnet test --configuration Release $project
        done

    - name: Check Coverage
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        chmod +x ./.github/scripts/check-coverage.sh
        ./.github/scripts/check-coverage.sh

  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          6.0.x
          8.0.x
          9.0.x
          10.0.x

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: csharp

    - name: Build for CodeQL
      shell: bash
      run: |
        for project in $(find ./src -name "*.csproj"); do
          dotnet build --configuration Release $project
        done

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:csharp"
